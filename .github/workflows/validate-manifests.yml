name: validate-manifests

on:
  pull_request:
    paths:
      - "modules-official/**"
      - "modules-community/**"
      - "modules-template/**"
      - "tools/validate-manifests.py"
      - ".github/workflows/validate-manifests.yml"
  push:
    branches: [main]
    paths:
      - "modules-official/**"
      - "modules-community/**"
      - "tools/validate-manifests.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run manifest validator
        run: python3 tools/validate-manifests.py
